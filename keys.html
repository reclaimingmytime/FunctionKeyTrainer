<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Function Key Trainer</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
    }

    #key {
      font-size: 64px;
      font-weight: bold;
      padding: 20px 40px;
      border: 3px solid #333;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <div id="key"></div>
  <div id="status"></div>

  <script>
    const keys = ["F1","F2","F3","F4","F5","F6","F7","F8","F9","F10","F11","F12"];

    // Fisher–Yates shuffle
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const shuffledKeys = shuffle([...keys]);

    let index = 0;

    const keyDisplay = document.getElementById("key");
    const status = document.getElementById("status");

    function update() {
      keyDisplay.textContent = shuffledKeys[index];
      status.textContent = `Press ${shuffledKeys[index]}`;
    }

    function next() {
      index++;
      if (index >= shuffledKeys.length) {
        keyDisplay.textContent = "DONE";
        status.textContent = "All function keys completed 🎉";
        return;
      }
      update();
    }

    window.addEventListener("keydown", (e) => {
      const expected = shuffledKeys[index];

      if (e.key.startsWith("F")) {
        e.preventDefault();
      }

      if (e.key === expected) {
        next();
      }
    });

    update();
  </script>

</body>
</html>
