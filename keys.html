<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Function Key Trainer</title>

<style>
  body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 20px;
    background: #f5f5f5;
  }

  #key {
    font-size: 60px;
    font-weight: bold;
    padding: 20px 40px;
    border: 3px solid #333;
    border-radius: 12px;
    background: white;
  }

  #status {
    font-size: 18px;
    color: #333;
  }

  /* Virtual keyboard */
	#keyboard {
		display: flex;
		gap: 18px; /* gap between F4/F5 and F8/F9 */
		margin-top: 20px;
	}

	.group {
		display: flex;
		gap: 6px; /* normal spacing between adjacent keys */
	}

  .key {
    width: 50px;
    height: 50px;
    background: #ddd;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    user-select: none;
    transition: 0.15s;
  }

  .active {
    background: #4a90e2;
    color: white;
    transform: scale(1.1);
  }

  .correct {
    background: #2ecc71 !important;
    color: white;
  }

  .wrong {
    background: #e74c3c !important;
    color: white;
  }
</style>
</head>

<body>

<div id="key"></div>
<div id="status"></div>

<div id="keyboard"></div>

<script>
  const keys = ["F1","F2","F3","F4","F5","F6","F7","F8","F9","F10","F11","F12"];

  let shuffledKeys = [];
  let index = 0;
  let finished = false;
  let restartKey = null;

  const keyDisplay = document.getElementById("key");
  const status = document.getElementById("status");
  const keyboard = document.getElementById("keyboard");

  // Fisher-Yates shuffle
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

	function buildKeyboard() {
		keyboard.innerHTML = "";

		for (let group = 0; group < 3; group++) {
		  const groupDiv = document.createElement("div");
		  groupDiv.className = "group";

		  for (let i = group * 4; i < group * 4 + 4; i++) {
		    const div = document.createElement("div");
		    div.className = "key";
		    div.textContent = keys[i];
		    div.dataset.key = keys[i];
		    groupDiv.appendChild(div);
		  }

		  keyboard.appendChild(groupDiv);
		}
	}

  function setActiveKey(key) {
    document.querySelectorAll(".key").forEach(el => {
      el.classList.toggle("active", el.dataset.key === key);
    });
  }

  function markKey(key, cls) {
    const el = document.querySelector(`[data-key="${key}"]`);
    if (!el) return;
    el.classList.add(cls);
    setTimeout(() => el.classList.remove(cls), 300);
  }

  function start() {
    shuffledKeys = shuffle([...keys]);
    index = 0;
    finished = false;
    restartKey = null;

    update();
  }

  function update() {
    const current = shuffledKeys[index];
    keyDisplay.textContent = current;
    status.textContent = `Press ${current}`;
    setActiveKey(current);
  }

  function finish() {
    finished = true;

    restartKey = keys[Math.floor(Math.random() * keys.length)];

    keyDisplay.textContent = "DONE";
    status.textContent = `Press ${restartKey} to restart`;
    setActiveKey(null);
  }

  function next() {
    index++;
    if (index >= shuffledKeys.length) {
      finish();
    } else {
      update();
    }
  }

  window.addEventListener("keydown", (e) => {
    const key = e.key;

    if (key.startsWith("F")) {
      e.preventDefault();
    }

    // Restart mode
    if (finished) {
      if (key === restartKey) {
        start();
      }
      return;
    }

    const expected = shuffledKeys[index];

    if (key === expected) {
      markKey(key, "correct");
      next();
    } else if (keys.includes(key)) {
      markKey(key, "wrong");
    }
  });

  buildKeyboard();
  start();
</script>

</body>
</html>
